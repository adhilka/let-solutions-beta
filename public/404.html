<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Let Solutions</title>
    <style>
        :root {
            --color-bg: #0b0f1a;
            --color-primary: #3b82f6;
            --color-text: #f8fafc;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container { max-width: 600px; padding: 20px; }
        h1 { font-size: 6rem; margin: 0; color: var(--color-primary); }
        p { font-size: 1.25rem; opacity: 0.8; margin: 20px 0 40px; }
        a {
            background-color: var(--color-primary);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s;
            display: inline-block;
        }
        a:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Oops! Page Not Found</h2>
        <p>The page you're looking for doesn't exist or has been moved to a new location.</p>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
